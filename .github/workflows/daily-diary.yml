name: Diary Auto-Update (aperiodic)

# 不定期更新策略 (2026-06-14 起，原每日 7AM)：
# 每周二/周五北京 7AM 触发检查，由 Claude 判断是否有值得写的实质判断——
# 没有就不写、不产生 commit。手动 Run workflow 可随时加更。
on:
  schedule:
    - cron: '0 23 * * 1,4'
  workflow_dispatch:

# 这个 job 需要写入仓库（git push）+ 失败时开 issue
permissions:
  contents: write
  issues: write

concurrency:
  group: daily-diary
  cancel-in-progress: false

jobs:
  update:
    name: Generate today's entry
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git author
        run: |
          git config user.name  "ClawQ Auto-Update Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Print today's parameters
        id: today
        run: |
          TODAY_UTC=$(date -u +%Y-%m-%d)
          TODAY_BJ=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          DAY_N=$(( ($(TZ=Asia/Shanghai date +%s) - $(date -d "2026-03-08" +%s)) / 86400 + 1 ))
          echo "today_utc=$TODAY_UTC" >> "$GITHUB_OUTPUT"
          echo "today_bj=$TODAY_BJ" >> "$GITHUB_OUTPUT"
          echo "day_n=$DAY_N" >> "$GITHUB_OUTPUT"
          echo "▶ UTC date:     $TODAY_UTC"
          echo "▶ Beijing date: $TODAY_BJ"
          echo "▶ Day number:   $DAY_N (3/8 起算)"

      - name: Run Claude agent — daily diary update
        uses: anthropics/claude-code-action@v1
        with:
          # 用 OAuth token 复用你已有的 Claude Pro/Max 订阅、不另付 API 账单
          # 本地跑 `claude setup-token` 拿 token、放到 secret CLAUDE_CODE_OAUTH_TOKEN
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Today is ${{ steps.today.outputs.today_bj }} (Beijing time), which is Day ${{ steps.today.outputs.day_n }} of the diary (counted from 2026-03-08).

            Read `.github/scripts/daily-prompt.md` from this repo — it contains the full procedure. Execute every step. The working directory is the repo root. Use the date and Day number above as authoritative.

            IMPORTANT — aperiodic policy: this diary is NOT daily anymore. First review what happened since the last entry. Only write a new entry if there is (a) a substantive development that changes an existing thesis, (b) a new judgment worth adding to the ledger, or (c) a published call being verified/falsified. If none apply, do NOT write an entry — just verify site consistency and exit WITHOUT committing, printing "今日无新判断，跳过". Quality over cadence; an empty week is acceptable, a filler post is not.

            If you do write: at the end, you MUST commit and push the changes yourself via the Bash tool. The git user is already configured. If today's entry already exists (re-run / replay), skip writing a new entry but still verify all metadata is consistent.
          claude_args: |
            --allowed-tools Read,Edit,Write,Bash,WebSearch,WebFetch
            --max-turns 40

      - name: Verify push (fallback safety net)
        if: always()
        run: |
          git status
          if [ -n "$(git status --porcelain)" ]; then
            echo "⚠ Uncommitted changes detected — agent did not commit. Committing as fallback."
            git add -A
            git commit -m "Daily update (fallback commit by workflow) · Day ${{ steps.today.outputs.day_n }}"
            git push
          else
            echo "✓ Working tree clean."
          fi

      # 失败时自动开 issue 通知用户（避免再次发生 5 天没人察觉）
      - name: Notify on failure (open issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const day = '${{ steps.today.outputs.day_n }}';
            const dateBJ = '${{ steps.today.outputs.today_bj }}';
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const title = `[daily-diary] Day ${day} (${dateBJ}) auto-update FAILED`;
            const body = [
              `日记自动更新（不定期策略）运行失败。`,
              ``,
              `**Day:** ${day}`,
              `**北京日期:** ${dateBJ}`,
              `**触发方式:** ${{ github.event_name }}`,
              `**Run 日志:** ${runUrl}`,
              ``,
              `常见原因：`,
              `1. \`CLAUDE_CODE_OAUTH_TOKEN\` secret 未配或失效（本地跑 \`claude setup-token\` 重新拿）→ [配置 secret](https://github.com/${{ github.repository }}/settings/secrets/actions)`,
              `2. \`anthropics/claude-code-action@v1\` 版本变更 → 改成 \`@beta\` 试试`,
              `3. Agent 跑超 \`--max-turns 40\` → 编辑 daily-diary.yml 提到 60`,
              `4. WebSearch quota / 网络问题 → 看 log 详细错误`,
              ``,
              `修好之后到 Actions 页面手动 Run workflow 重跑，或等下个触发日（周二/周五 7AM）自动重试。`,
              ``,
              `本 issue 由 daily-diary workflow 自动生成。修复后直接关闭即可。`
            ].join('\n');
            // 检查是否已有同样未关闭的 issue（避免连续失败开 5 个相同 issue）
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'daily-diary-failure',
              state: 'open',
              per_page: 5
            });
            if (existing.data.length > 0) {
              // 已有未关闭 issue，仅追加评论
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `又失败一次：Day ${day} (${dateBJ}) · [log](${runUrl})`
              });
              core.info(`已在 issue #${existing.data[0].number} 上追加评论`);
            } else {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['daily-diary-failure']
              });
              core.info(`已开 issue #${issue.data.number}`);
            }
