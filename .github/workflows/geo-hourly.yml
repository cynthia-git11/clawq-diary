name: GEO Hourly (crawl-ping + health check)

# 每小时巡检 GEO 健康度（结构化数据 / XML / robots / 最新一篇同步 / 计数一致），
# 并在内容近 1 小时内有变更时催 IndexNow 重抓。
# 只读内容、不改不空提交；巡检失败 → 工作流失败 + 写入固定 issue 提醒。
on:
  schedule:
    - cron: '0 * * * *'        # 每小时整点（UTC）
  push:
    branches: [ main ]
    paths:
      - '**.html'
      - '**.txt'
      - '**.xml'
      - 'archive/**'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: geo-hourly
  cancel-in-progress: false

jobs:
  geo:
    name: GEO health check + crawl ping
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: GEO health check (read-only)
        run: python3 scripts/geo-check.py

      - name: Ping IndexNow when content changed (Bing / Yandex / Seznam / Naver)
        if: success()
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if [ -z "$(git log --since='70 minutes ago' --oneline)" ]; then
              echo "No content change in the last hour — skip IndexNow (avoid no-op spam)."
              exit 0
            fi
          fi
          KEY="d9cbec26916a25296455ffb28243f03f"
          HOST="cynthia-git11.github.io"
          BASE="https://$HOST/clawq-diary"
          curl -fsS -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"$HOST\",\"key\":\"$KEY\",\"keyLocation\":\"$BASE/$KEY.txt\",\"urlList\":[\"$BASE/\",\"$BASE/en.html\",\"$BASE/ja.html\",\"$BASE/theses.html\",\"$BASE/atom.xml\"]}" \
            && echo "IndexNow pinged." || echo "IndexNow ping failed (non-fatal)."

      - name: Alert to a fixed issue on health-check failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = 'clawq-geo-alert';
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const when = new Date().toISOString().slice(0, 16).replace('T', ' ');
            const body = `GEO 健康巡检失败 — ${when} UTC\n\n结构化数据 / XML / robots / 最新一篇同步 / 计数 出现问题，详见运行日志：\n${run}\n\n（本任务只巡检、不自动改内容；请手动或让 Claude 修复后重跑。）`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: marker, state: 'open', per_page: 1
            });
            if (existing.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: '⚠️ GEO 健康巡检告警', body, labels: [marker]
              });
            }
