name: Daily Traffic Report

# 每天北京时间 7:30AM (UTC 23:30 前一天) 滚动重算访问数据 + 生成日报。
# 纯数据生成 + git，只用 GITHUB_TOKEN，不依赖任何 API token —— 能独立跑成功。
on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: daily-traffic
  cancel-in-progress: false

jobs:
  report:
    name: Roll traffic data + write daily report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Roll window to today (Beijing) + generate report
        run: |
          TODAY_BJ=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          echo "Rolling traffic window to $TODAY_BJ"
          TRAFFIC_END="$TODAY_BJ" python3 scripts/gen-traffic.py

      - name: Commit if changed
        run: |
          git config user.name  "ClawQ Traffic Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/js/analytics-data.js TRAFFIC-REPORT.md
          if git diff --cached --quiet; then
            echo "No change."
          else
            git commit -m "chore(analytics): daily traffic report $(TZ=Asia/Shanghai date +%Y-%m-%d)"
            git push
          fi

      - name: Post daily report to a fixed issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('TRAFFIC-REPORT.md', 'utf8');
            const today = new Date().toISOString().slice(0, 10);
            const marker = 'clawq-traffic-daily';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: marker, state: 'open', per_page: 1
            });
            if (existing.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `### ${today}\n\n${body}`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: '📊 访问数据日报（每日自动更新）',
                body: body, labels: [marker]
              });
            }
